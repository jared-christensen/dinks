<!DOCTYPE html>
<html>
<head>
  <title>CourtReserve Widget Test</title>
</head>
<body>
  <h1>Testing CourtReserve Widget</h1>

  <iframe
    id="form-iframe"
    class="form-iframe-100495"
    src="https://widgets.courtreserve.com/Online/Public/EmbedCode/10812/100495"
    style="margin:0; width:100%; border:none; overflow:hidden;"
    scrolling="no">
  </iframe>

  <script type="text/javascript">
    var myEventMethod = window.addEventListener ? "addEventListener" : "attachEvent";
    var myEventListener = window[myEventMethod];
    var myEventMessage = myEventMethod == "attachEvent" ? "onmessage" : "message";
    myEventListener(myEventMessage, function(e) {
      console.log('Message received:', e.data);
      switch (e.data.action) {
        case "setHeight": {
          var embedCodeId = e.data.embedCodeId;
          console.log('Setting height to:', e.data.height, 'for embedCodeId:', embedCodeId);
          if (embedCodeId != null && embedCodeId != '') {
            var elements = document.getElementsByClassName('form-iframe-' + embedCodeId);
            for (var i = 0; i < elements.length; i++) {
              elements[i].style.height = (e.data.height) + "px";
            }
          } else {
            document.getElementById('form-iframe').height = (e.data.height) + "px";
          }
          break;
        }
      }
    }, false);
  </script>
</body>
</html>
